name: Build LARA with TrollStore

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Setup Xcode
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: latest-stable

    - name: Show Xcode version
      run: xcodebuild -version

    - name: List project structure
      run: |
        echo "=== Project Structure ==="
        ls -la
        echo "=== Checking new files ==="
        ls -la lara/kexploit/pe/amfi.* || echo "⚠️ AMFI files not found"
        ls -la lara/kexploit/pe/installd_patch.* || echo "⚠️ installd_patch files not found"
        ls -la lara/views/TrollStoreInstallerView.swift || echo "⚠️ TrollStoreInstallerView not found"

    - name: Check if files are in Xcode project
      run: |
        echo "=== Checking Xcode project ==="
        grep -c "amfi.m" lara.xcodeproj/project.pbxproj || echo "⚠️ amfi.m NOT in project"
        grep -c "installd_patch.m" lara.xcodeproj/project.pbxproj || echo "⚠️ installd_patch.m NOT in project"
        grep -c "TrollStoreInstallerView.swift" lara.xcodeproj/project.pbxproj || echo "⚠️ TrollStoreInstallerView NOT in project"

    - name: Build project
      run: |
        xcodebuild clean build \
          -project lara.xcodeproj \
          -scheme lara \
          -configuration Release \
          -destination 'generic/platform=iOS' \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGNING_ALLOWED=NO

    - name: Archive project
      run: |
        xcodebuild archive \
          -project lara.xcodeproj \
          -scheme lara \
          -configuration Release \
          -archivePath build/lara.xcarchive \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGNING_ALLOWED=NO

    - name: Upload build artifacts
      uses: actions/upload-artifact@v3
      if: success()
      with:
        name: lara-trollstore-build
        path: |
          build/
        retention-days: 7
