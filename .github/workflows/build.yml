name: build

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: select xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: show xcode version
        run: xcodebuild -version

      - name: build
        run: |
          xcodebuild \
            -project lara.xcodeproj \
            -scheme lara \
            -configuration Debug \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            AD_HOC_CODE_SIGNING_ALLOWED=YES \
            IPHONEOS_DEPLOYMENT_TARGET=16.0 \
            HEADER_SEARCH_PATHS='$(inherited) $(PROJECT_DIR)/lara/**' \
            USER_HEADER_SEARCH_PATHS='$(inherited) $(PROJECT_DIR)/lara/**' \
            LIBRARY_SEARCH_PATHS='$(inherited) $(PROJECT_DIR)/lara/lib' \
            ASSETCATALOG_COMPILER_APPICON_NAME="" \
            ASSETCATALOG_COMPILER_SKIP_APP_SPECIFIC_ASSETS=YES \
            clean build
            
      - name: Create IPA
        run: |
          APP_PATH=$(find ~/Library/Developer/Xcode/DerivedData -name "lara.app" -type d | head -n 1)
          mkdir -p Payload
          cp -r "$APP_PATH" Payload/
          zip -r lara.ipa Payload

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: lara.ipa
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
