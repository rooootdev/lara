name: build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    # Use macos-15 to ensure Xcode 16.0+ is available
    runs-on: macos-latest

    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: select xcode
        # Points to the standard location for Xcode 16 on GitHub Runners
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: show xcode version
        run: xcodebuild -version

      - name: build
        run: |
          xcodebuild \
            -project lara.xcodeproj \
            -scheme lara \
            -configuration Debug \
            -sdk iphoneos \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            clean build
