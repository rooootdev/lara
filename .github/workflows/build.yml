name: build

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-26

    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: setup xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: show xcode version
        run: xcodebuild -version

      - name: install ldid
        run: brew install ldid

      - name: build
        run: |
          chmod +x scripts/build_ipa.sh
          ./scripts/build_ipa.sh

      - name: upload build artifact (PR only)
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: lara-ipa
          path: |
            build/lara.ipa
            build/xcodebuild.log

      - name: upload ipa for release
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: release-ipa
          path: build/lara.ipa


  release:
    if: github.event_name != 'pull_request'
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: download ipa
        uses: actions/download-artifact@v4
        with:
          name: release-ipa
          path: build/

      - name: set metadata
        run: |
          echo "COMMIT=$(git rev-parse --short HEAD)" >> $GITHUB_ENV
          echo "DATE=$(date +'%Y-%m-%d %H:%M')" >> $GITHUB_ENV
          echo "FILEDATE=$(date +'%Y%m%d-%H%M')" >> $GITHUB_ENV

      - name: get last 12h commits
        run: |
          COMMITS=$(git log --since="12 hours ago" --pretty=format:"- %h %s (%an)")
          if [ -z "$COMMITS" ]; then
            COMMITS="no commits in the last 12 hours"
          fi

          echo "COMMITS<<EOF" >> $GITHUB_ENV
          echo "$COMMITS" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: get existing nightly release body
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BODY=$(gh release view nightly --json body -q .body 2>/dev/null || echo "")
          echo "BODY<<EOF" >> $GITHUB_ENV
          echo "$BODY" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: build release notes
        run: |
          {
            echo "lara_${COMMIT} (${DATE}):"
            echo "${COMMITS}"
            echo ""
            echo ""
            echo "${BODY}"
          } > release_notes.txt

      - name: rename ipa
        run: |
          mkdir -p archived_ipas
          cp build/lara.ipa "archived_ipas/lara_${COMMIT}_${FILEDATE}.ipa"

      - name: create or update nightly release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create nightly \
            archived_ipas/*.ipa \
            --title "Nightly" \
            --notes-file release_notes.txt \
            --prerelease \
          || gh release edit nightly \
            --title "Nightly" \
            --notes-file release_notes.txt \
            --prerelease

      - name: upload more ipa stuff blah blah
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          for file in archived_ipas/*.ipa; do
            gh release upload nightly "$file" --clobber=false || true
          done
