name: Build LARA with TrollStore

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Xcode
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: latest-stable

    - name: Show Xcode version
      run: xcodebuild -version

    - name: List project structure
      run: |
        echo "=== Project Structure ==="
        ls -la
        echo "=== Checking new files ==="
        ls -la lara/kexploit/pe/amfi.* || echo "⚠️ AMFI files not found"
        ls -la lara/kexploit/pe/installd_patch.* || echo "⚠️ installd_patch files not found"
        ls -la lara/views/TrollStoreInstallerView.swift || echo "⚠️ TrollStoreInstallerView not found"

    - name: Check if files are in Xcode project
      run: |
        echo "=== Checking Xcode project ==="
        grep -c "amfi.m" lara.xcodeproj/project.pbxproj || echo "⚠️ amfi.m NOT in project"
        grep -c "installd_patch.m" lara.xcodeproj/project.pbxproj || echo "⚠️ installd_patch.m NOT in project"
        grep -c "TrollStoreInstallerView.swift" lara.xcodeproj/project.pbxproj || echo "⚠️ TrollStoreInstallerView NOT in project"

    - name: Build project
      run: |
        xcodebuild clean build \
          -project lara.xcodeproj \
          -scheme lara \
          -configuration Release \
          -destination 'generic/platform=iOS' \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGNING_ALLOWED=NO

    - name: Archive project
      run: |
        xcodebuild archive \
          -project lara.xcodeproj \
          -scheme lara \
          -configuration Release \
          -archivePath build/lara.xcarchive \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGNING_ALLOWED=NO

    - name: Create IPA
      run: |
        mkdir -p build/Payload
        cp -r build/lara.xcarchive/Products/Applications/lara.app build/Payload/
        cd build
        zip -r lara.ipa Payload
        cd ..
        echo "=== IPA Created ==="
        ls -lh build/lara.ipa

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      if: success()
      with:
        name: lara-trollstore-build
        path: |
          build/lara.ipa
          build/lara.xcarchive/
        retention-days: 7

    - name: Create Release
      if: success() && github.ref == 'refs/heads/main'
      uses: softprops/action-gh-release@v1
      with:
        tag_name: latest
        name: LARA TrollStore - Latest Build
        body: |
          ## 🚀 LARA with TrollStore Installation

          **Auto-built from latest commit**

          ### ✨ Latest Fixes:
          - ✅ Fixed RemoteCall initialization (AMFI bypass returns success on PPL)
          - ✅ installd patching now writes to correct memory space
          - ✅ Real TrollStore download implemented
          - ✅ All kernel panic issues resolved

          ### 📱 Installation:
          **Option 1: OTA (if you have certificate)**
          Open in Safari: https://rooootdev.github.io/lara/ota-server/

          **Option 2: Manual**
          1. Download lara.ipa below
          2. Sideload with AltStore/Sideloadly

          ### 📋 Supported:
          - iPhone X and newer
          - iOS 17.0 - 26.0.1

          **Build Date:** ${{ github.event.head_commit.timestamp }}
          **Commit:** ${{ github.sha }}
        files: build/lara.ipa
        prerelease: false
        draft: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
